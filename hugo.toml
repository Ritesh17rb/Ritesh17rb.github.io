# TODO: replace YOUR-GITHUB-USERNAME once you create the GitHub repo.
# For an exact clone of the original's URL structure (site at domain root, blog
# under /blog/), name the repo "<username>.github.io" (a GitHub Pages user site)
# or attach a custom domain.
baseURL = "https://YOUR-GITHUB-USERNAME.github.io/blog/"
title = "Ritesh"
languageCode = "en-us"
enableRobotsTXT = true
# Enable aliases for redirects
disableAliases = false
relativeURLs = false
canonifyURLs = false
theme = "PaperMod"
publishDir = "public/blog"
rssLimit = 20
cleanDestinationDir = true

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  posts = "/:slug/"
  categories = "/category/:slug/"
  tags = "/tag/:slug/"

[markup]
[markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.highlight]
    noClasses = false
    style = "github"

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "static/assets"

[params]
  logoURL = "https://YOUR-GITHUB-USERNAME.github.io/"
  description = "Technology, education and fun"
  [params.author]
    name = "Ritesh"
    email = ""
  defaultTheme = "light"
  disableThemeToggle = false
  ShowBreadCrumbs = false
  ShowPostNavLinks = true
  ShowReadingTime = false
  ShowWordCount = false
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  DateFormat = "2006-01-02"
  mainSections = ["posts"]

[params.assets]
  favicon = "assets/favicon.svg"
  favicon16x16 = "assets/favicon.svg"
  favicon32x32 = "assets/favicon.svg"
  apple_touch_icon = "assets/favicon.svg"
  safari_pinned_tab = "assets/favicon.svg"

[params.github]
  rawMarkdownBase = "https://raw.githubusercontent.com/YOUR-GITHUB-USERNAME/blog/main"

[outputFormats]
  [outputFormats.navjson]
    mediaType = "application/json"
    baseName = "nav"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "navjson"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[pagination]
  pagerSize = 20
  path = "page"
  disableAliases = true
