# Site is served from the domain root (GitHub Pages user site: repo must be
# named "Ritesh17rb.github.io"), with the blog under /blog/.
baseURL = "https://ritesh17rb.github.io/blog/"
title = "Ritesh"
languageCode = "en-us"
enableRobotsTXT = true
# Enable aliases for redirects
disableAliases = false
relativeURLs = false
canonifyURLs = false
theme = "PaperMod"
publishDir = "public/blog"
rssLimit = 20
cleanDestinationDir = true

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  posts = "/:slug/"
  categories = "/category/:slug/"
  tags = "/tag/:slug/"

[markup]
[markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.highlight]
    noClasses = false
    style = "github"

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "static/assets"

[params]
  logoURL = "https://ritesh17rb.github.io/"
  description = "Technology, education and fun"
  defaultTheme = "light"
  disableThemeToggle = false
  ShowBreadCrumbs = false
  ShowPostNavLinks = true
  ShowReadingTime = false
  ShowWordCount = false
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  DateFormat = "2006-01-02"
  mainSections = ["posts"]
  comments = true
  # Get this from your project settings at https://cusdis.com after adding
  # this site (data page-id is the post's RelPermalink, no login required
  # for visitors to comment; new comments wait in the moderation queue).
  cusdisAppId = ""
  [params.author]
    name = "Ritesh"
    email = ""

[params.assets]
  favicon = "assets/favicon.svg"
  favicon16x16 = "assets/favicon.svg"
  favicon32x32 = "assets/favicon.svg"
  apple_touch_icon = "assets/favicon.svg"
  safari_pinned_tab = "assets/favicon.svg"

[params.github]
  rawMarkdownBase = "https://raw.githubusercontent.com/Ritesh17rb/Ritesh17rb.github.io/main"

[outputFormats]
  [outputFormats.navjson]
    mediaType = "application/json"
    baseName = "nav"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "navjson"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[pagination]
  pagerSize = 20
  path = "page"
  disableAliases = true
