name: Deploy Hugo site (cost-optimized)

on:
  push:
    branches: [main]
    # Do not deploy non-site changes
    paths:
      - "hugo.toml"
      - "setup.sh"
      - "metadata.yml"
      - "posts/**"
      - "pages/**"
      - "content/**"
      - "layouts/**"
      - "static/**"
      - "assets/**"
      - "scripts/**"
      - "themes/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Keep [skip ci] support for explicit no-deploy commits.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch only the triggering commit
          fetch-depth: 1
          # Don't write auth creds into local git config since this job never pushes.
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        # For minimum storage cost, keep caches off.
        # If you care more about speed than storage, set these to true.
        # with:
        #   enable-cache: false

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Build site
        run: bash setup.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
