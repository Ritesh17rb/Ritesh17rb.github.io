{{- $appId := site.Params.cusdisAppId }}
{{- if $appId }}
<div
  id="cusdis_thread"
  data-host="https://cusdis.com"
  data-app-id="{{ $appId }}"
  data-page-id="{{ .RelPermalink }}"
  data-page-url="{{ .Permalink }}"
  data-page-title="{{ .Title }}"
  data-theme="{{ if eq (.Site.Params.defaultTheme | default "auto") "dark" }}dark{{ else }}light{{ end }}"
></div>
<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
<script>
  (function () {
    // Keep Cusdis in sync when the site's own light/dark toggle is used.
    var toggle = document.getElementById("theme-toggle");
    if (toggle) {
      toggle.addEventListener("click", function () {
        var theme = document.documentElement.dataset.theme === "dark" ? "dark" : "light";
        if (window.CUSDIS && window.CUSDIS.setTheme) {
          window.CUSDIS.setTheme(theme);
        }
      });
    }
  })();
</script>
{{- end }}
